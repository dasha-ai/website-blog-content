name: publish to website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-to-website
  cancel-in-progress: false

jobs:
  open-gitlab-merge-request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout content
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate content
        run: npm test

      - name: Open GitLab website merge request
        run: node scripts/create-gitlab-submodule-mr.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_BLOG_SYNC_TOKEN }}
          GITLAB_API_URL: https://gitlab.dasha.ai/api/v4
          GITLAB_PROJECT_ID: '75'
          GITLAB_REPOSITORY_URL: https://gitlab.dasha.ai/dasha.ai/frontend-team/english-teaser-website.git
          GITLAB_TARGET_BRANCH: master
